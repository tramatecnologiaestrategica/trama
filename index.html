<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Trama Tecnologia Estratégica — sites, landing pages e presença digital com estratégia e qualidade técnica."
    />
    <title>Trama — tecnologia estratégica</title>
    <script>
      (function () {
        try {
          var k = 'trama-theme',
            t = localStorage.getItem(k)
          if (t === 'dark' || t === 'light') {
            document.documentElement.dataset.theme = t
            return
          }
        } catch (e) {}
        var d =
          window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.dataset.theme = d ? 'dark' : 'light'
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
